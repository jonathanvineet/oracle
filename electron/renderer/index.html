<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https: ws: http:;">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WODGET EVERYTHING ORACLE</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="glass">
    <div id="login" class="panel">
      <h3>WODGET EVERYTHING</h3>
      <input id="server" placeholder="Server URL (https://...)" />
      <input id="username" placeholder="Username" />
      <input id="password" placeholder="Password" type="password" />
      <div class="row">
        <button id="loginBtn">Login</button>
        <button id="logoutBtn" style="display:none">Logout</button>
      </div>
      <div class="row">
        <label><input id="alwaysOnTop" type="checkbox" checked /> Always on top</label>
      </div>
    </div>
    <div id="viewer" class="panel" style="display:none">
      <div class="toolbar">
        <button id="toggleStream">Start</button>
        <button id="settingsBtn">Settings</button>
      </div>
      <div id="frameHolder">
        <img id="frame" alt="live" />
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
