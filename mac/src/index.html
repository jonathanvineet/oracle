<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oracle — Live Camera</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #06B6D4;
      --cyan-dim: rgba(6,182,212,0.15);
      --bg:      #0F1724;
      --surface: rgba(17,24,39,0.9);
      --border:  rgba(6,182,212,0.2);
      --text:    #E5E7EB;
      --muted:   #6B7280;
      --green:   #22C55E;
      --red:     #EF4444;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 16px;
      gap: 12px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.05em;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; }

    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    /* ── Stream area ── */
    .stream-wrap {
      flex: 1;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
    }

    #stream-img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .stream-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }

    .stream-placeholder .icon { font-size: 40px; opacity: 0.35; }

    /* ── Config panel ── */
    .config-panel {
      display: flex;
      gap: 8px;
      align-items: stretch;
      flex-shrink: 0;
    }

    .ip-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #00FF88;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .ip-input::placeholder { color: var(--muted); font-family: inherit; }
    .ip-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(6,182,212,0.12); }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-connect {
      background: var(--cyan);
      color: #082032;
    }

    .btn-connect:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-connect:active { transform: translateY(0); }

    .btn-disconnect {
      background: rgba(239,68,68,0.15);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.3);
    }

    .btn-disconnect:hover { background: rgba(239,68,68,0.25); }

    /* ── Info row ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding: 0 2px;
    }

    .info-label { font-size: 11px; color: var(--muted); }
    .info-value { font-size: 11px; font-family: monospace; color: var(--cyan); }

    /* ── Toast ── */
    .toast {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">🎬 ORACLE</div>
      <div class="status-badge">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">OFFLINE</span>
      </div>
    </div>

    <!-- Stream -->
    <div class="stream-wrap">
      <img id="stream-img" src="" alt="" style="display:none" />
      <div class="stream-placeholder" id="placeholder">
        <div class="icon">📵</div>
        <div>Enter your phone's IP below</div>
      </div>
    </div>

    <!-- Config -->
    <div class="config-panel">
      <input
        type="text"
        class="ip-input"
        id="ip-input"
        placeholder="192.168.x.x  or  100.x.x.x (Tailscale)"
        spellcheck="false"
      />
      <button class="btn btn-connect" id="btn-connect" onclick="connect()">Connect</button>
      <button class="btn btn-disconnect" id="btn-disconnect" onclick="disconnect()" style="display:none">Stop</button>
    </div>

    <!-- Info -->
    <div class="info-row">
      <span class="info-label" id="info-left">Set your Android phone's IP address</span>
      <span class="info-value" id="info-right"></span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const KEY = 'oracle-android-ip'
    const PORT = 8080

    const streamImg   = document.getElementById('stream-img')
    const placeholder = document.getElementById('placeholder')
    const dot         = document.getElementById('status-dot')
    const statusText  = document.getElementById('status-text')
    const ipInput     = document.getElementById('ip-input')
    const btnConnect  = document.getElementById('btn-connect')
    const btnDisconn  = document.getElementById('btn-disconnect')
    const infoLeft    = document.getElementById('info-left')
    const infoRight   = document.getElementById('info-right')
    const toast       = document.getElementById('toast')

    let connected = false
    let streamUrl = ''

    // Restore saved IP
    const saved = localStorage.getItem(KEY)
    if (saved) ipInput.value = saved

    function connect() {
      const ip = ipInput.value.trim()
      if (!ip) { showToast('Enter your phone\'s IP address first'); return }

      localStorage.setItem(KEY, ip)
      streamUrl = `http://${ip}:${PORT}/stream`

      // Set src — browser will handle MJPEG natively
      streamImg.src = streamUrl

      streamImg.onload = () => {
        // onload fires on first MJPEG frame — connection confirmed
        setOnline(ip)
      }

      streamImg.onerror = () => {
        setOffline()
        showToast(`❌ Can't reach ${ip}:${PORT} — is the app streaming?`)
      }

      streamImg.style.display = 'block'
      placeholder.style.display = 'none'
      statusText.textContent = 'CONNECTING…'
      infoLeft.textContent = `http://${ip}:${PORT}/stream`
    }

    function disconnect() {
      streamImg.src = ''
      streamImg.style.display = 'none'
      placeholder.style.display = 'flex'
      setOffline()
      infoLeft.textContent = 'Set your Android phone\'s IP address'
      infoRight.textContent = ''
    }

    function setOnline(ip) {
      connected = true
      dot.className = 'dot live'
      statusText.textContent = 'LIVE'
      btnConnect.style.display = 'none'
      btnDisconn.style.display = 'block'
      infoLeft.textContent = `http://${ip}:${PORT}/stream`
      infoRight.textContent = 'MJPEG · local'
    }

    function setOffline() {
      connected = false
      dot.className = 'dot'
      statusText.textContent = 'OFFLINE'
      btnConnect.style.display = 'block'
      btnDisconn.style.display = 'none'
      streamImg.style.display = 'none'
      placeholder.style.display = 'flex'
    }

    let toastTimer
    function showToast(msg) {
      toast.textContent = msg
      toast.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000)
    }

    // Auto-connect if IP was saved
    if (saved) setTimeout(connect, 300)

    // Reconnect on Enter key
    ipInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') connect()
    })
  </script>
</body>
</html>
